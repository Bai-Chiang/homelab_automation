---
- name: apt install wpasupplicant
  ansible.builtin.apt: name=wpasupplicant state=present
  become: true

- name: systemctl daemon-reload
  ansible.builtin.systemd_service:
    daemon_reload: true
  become: true

- name: systemctl disable wpa_supplicant.service
  ansible.builtin.systemd_service: name=wpa_supplicant.service enabled=false
  become: true
